name: WordFlow
options:
  bundleIdPrefix: com.vextwizzy
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  WordFlow:
    type: application
    platform: iOS
    sources:
      - App
      - Core
      - Features
      - UI
      - Utilities
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vextwizzy.WordFlow
      INFOPLIST_FILE: Resources/Info.plist
      CODE_SIGNING_ALLOWED: "NO"
    info:
      path: Resources/Info.plist