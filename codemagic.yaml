workflows:
  ios-app:
    name: WordFlow
    environment:
      xcode: 16.0
    scripts:
      - name: Generate Xcode project
        script: |
          brew install xcodegen
          xcodegen generate
          ls -la
          xcodebuild -list
      - name: Build
        script: |
          xcodebuild -project WordFlow.xcodeproj \
            -scheme WordFlow \
            -configuration Release \
            -sdk iphoneos \
            build CODE_SIGNING_ALLOWED=NO
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app