name: WordFlow
options:
  bundleIdPrefix: com.vextwizzy
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  WordFlow:
    type: application
    platform: iOS
    sources:
      - App
      - Core
      - Features
      - UI
      - Utilities
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vextwizzy.WordFlow
        INFOPLIST_FILE: Resources/Info.plist
    info:
      path: Resources/Info.plist