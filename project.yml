name: WordFlow
options:
  bundleIdPrefix: com.vextwizzy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Resources/Info.plist
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_STYLE: Manual

targets:
  WordFlow:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Core
      - path: Features
      - path: UI
      - path: Utilities
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vextwizzy.WordFlow
        INFOPLIST_FILE: Resources/Info.plist
        DEVELOPMENT_TEAM: ""
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    dependencies: []
    info:
      path: Resources/Info.plist