Add-Content -Path "project.yml" -Value @"
name: WordFlow
options:
  bundleIdPrefix: com.vextwizzy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Resources/Info.plist

targets:
  WordFlow:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Core
      - path: Features
      - path: UI
      - path: Utilities
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vextwizzy.WordFlow
        INFOPLIST_FILE: Resources/Info.plist
        DEVELOPMENT_TEAM: ""
"@ -Encoding UTF8